name: Daily Vulture 10K Refresh

on:
  schedule:
    # This runs the workflow at 05:00 UTC (12:00 AM EST) every single day
    - cron: '0 5 * * *'
  workflow_dispatch: # This allows you to click a button and run it manually anytime

jobs:
  refresh-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential: Gives the bot permission to save the new blog content

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any extra libraries here (e.g., requests, beautifulsoup4)

      - name: Run Vulture Engine
        # This executes the Python script we created to generate new content
        run: python vulture_engine.py

      - name: Commit and Push Changes
        # This captures the modified blog.html and pushes it back to your repo
        run: |
          git config --global user.name "Vulture-Bot-Daily"
          git config --global user.email "bot@brightlane.github.io"
          git add blog.html
          git commit -m "Vulture 10K Daily Sync: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
